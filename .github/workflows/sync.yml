name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          lfs: true
          
      - name: Install Hugging Face CLI
        run: pipx install huggingface_hub[cli]
        
      - name: Upload files to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: huggingface-cli upload jasps/gas-app-ai . . --repo-type space --token $HF_TOKEN
